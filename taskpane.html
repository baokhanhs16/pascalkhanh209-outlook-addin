<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Send to Power Automate</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <style>
    :root {
      --brand:    #0078d4;
      --brand-dk: #005a9e;
      --success:  #107c10;
      --error:    #a4262c;
      --bg:       #f3f2f1;
      --surface:  #ffffff;
      --text:     #201f1e;
      --muted:    #605e5c;
      --border:   #edebe9;
      --radius:   6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      padding: 16px;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    header h1 { font-size: 15px; font-weight: 600; color: var(--brand); }

    /* ── Section titles ─────────────────────────────────────────── */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* ── Email card ─────────────────────────────────────────────── */
    #emailCard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 14px;
    }
    .card-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: baseline; }
    .card-row:last-child { margin-bottom: 0; }
    .label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; min-width: 52px; }
    .value { font-size: 13px; color: var(--text); word-break: break-word; }

    /* ── Section block ──────────────────────────────────────────── */
    .section { margin-bottom: 14px; }

    /* ── Attachment list ────────────────────────────────────────── */
    .attach-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
      align-items: center;
    }
    .link-btn {
      font-size: 11px;
      color: var(--brand);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      text-decoration: underline;
    }
    .link-btn:hover { color: var(--brand-dk); }

    .attach-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .attach-list li {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .attach-list li label { display: flex; align-items: center; gap: 8px; flex: 1; cursor: pointer; min-width: 0; }
    .attach-list li .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .attach-list li .fsize { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .no-attach { color: var(--muted); font-style: italic; font-size: 12px; padding: 4px 0; }

    /* ── Collapsible dropdown ───────────────────────────────────── */
    .collapsible-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
      margin-bottom: 0;
    }
    .collapsible-header:hover { background: #f9f8f7; }
    .collapsible-header .chevron {
      transition: transform 0.2s;
      color: var(--muted);
      font-size: 10px;
    }
    .collapsible-header.open .chevron { transform: rotate(180deg); }
    .collapsible-body {
      display: none;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      background: var(--surface);
      padding: 8px 10px;
    }
    .collapsible-body.open { display: block; }
    .collapsible-header .img-count {
      font-size: 11px;
      background: var(--brand);
      color: #fff;
      border-radius: 10px;
      padding: 1px 7px;
      margin-left: 6px;
    }

    /* ── Comment box ────────────────────────────────────────────── */
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      resize: vertical;
      min-height: 70px;
      background: var(--surface);
    }
    textarea:focus { outline: 2px solid var(--brand); border-color: transparent; }

    /* ── Function select ────────────────────────────────────────── */
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      background: var(--surface);
      cursor: pointer;
    }
    select:focus { outline: 2px solid var(--brand); border-color: transparent; }

    /* ── Send button ────────────────────────────────────────────── */
    #sendBtn {
      width: 100%;
      padding: 10px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .15s;
      margin-bottom: 12px;
    }
    #sendBtn:hover:not(:disabled) { background: var(--brand-dk); }
    #sendBtn:disabled { background: #a19f9d; cursor: not-allowed; }

    /* ── Status banner ──────────────────────────────────────────── */
    #statusBox {
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 13px;
      display: none;
      align-items: flex-start;
      gap: 8px;
    }
    #statusBox.show  { display: flex; }
    #statusBox.info  { background: #deecf9; color: #004578; border: 1px solid #b3d7f2; }
    #statusBox.ok    { background: #dff6dd; color: #054b16; border: 1px solid #9fd89b; }
    #statusBox.fail  { background: #fde7e9; color: #6e1a20; border: 1px solid #f6b0b5; }
    #statusMsg { line-height: 1.4; }

    /* ── Password Modal ─────────────────────────────────────────── */
    #pwOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #pwOverlay.show { display: flex; }
    #pwModal {
      background: var(--surface);
      border-radius: 8px;
      padding: 24px 20px 20px;
      width: 280px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    #pwModal h2 { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    #pwModal p  { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.4; }
    #pwInput {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      font-size: 14px;
      margin-bottom: 6px;
      font-family: inherit;
    }
    #pwInput:focus { outline: 2px solid var(--brand); border-color: transparent; }
    #pwError { font-size: 12px; color: var(--error); min-height: 16px; margin-bottom: 10px; }
    .pw-actions { display: flex; gap: 8px; }
    #pwSubmit {
      flex: 1;
      padding: 9px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #pwSubmit:hover { background: var(--brand-dk); }
    #pwCancel {
      padding: 9px 14px;
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      cursor: pointer;
    }
    #pwCancel:hover { background: var(--bg); }

    /* ── Skeleton ───────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, #edebe9 25%, #f3f2f1 50%, #edebe9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 3px;
      height: 13px;
      display: inline-block;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .dots::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots { 0% { content:''; } 33% { content:'.'; } 66% { content:'..'; } 100% { content:'...'; } }
  </style>
</head>
<body>

  <header>
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="6" fill="#0078d4"/>
      <path d="M16 5L8 16h7l-3 7 11-13h-7l2-5z" fill="#fff"/>
    </svg>
    <h1>Send to Power Automate</h1>
  </header>

  <!-- Email preview -->
  <div id="emailCard">
    <div class="card-row">
      <span class="label">From</span>
      <span class="value" id="metaFrom"><span class="skeleton" style="width:140px"></span></span>
    </div>
    <div class="card-row">
      <span class="label">Subject</span>
      <span class="value" id="metaSubject"><span class="skeleton" style="width:180px"></span></span>
    </div>
    <div class="card-row">
      <span class="label">Date</span>
      <span class="value" id="metaDate"><span class="skeleton" style="width:100px"></span></span>
    </div>
  </div>

  <!-- File Attachments -->
  <div class="section" id="fileSection">
    <div class="section-title">File Attachments</div>
    <div class="attach-controls" id="fileControls" style="display:none">
      <button class="link-btn" id="selectAllFiles">Select All</button>
      <span style="color:var(--border)">|</span>
      <button class="link-btn" id="deselectAllFiles">Deselect All</button>
    </div>
    <ul class="attach-list" id="fileList">
      <li><span class="skeleton" style="width:100%"></span></li>
    </ul>
  </div>

  <!-- Image Attachments (collapsible) -->
  <div class="section" id="imageSection" style="display:none">
    <div class="section-title">Image Attachments</div>
    <div class="collapsible-header" id="imgToggle">
      <span>
        Images in this email
        <span class="img-count" id="imgCount">0</span>
      </span>
      <span class="chevron">▼</span>
    </div>
    <div class="collapsible-body" id="imgBody">
      <div class="attach-controls">
        <button class="link-btn" id="selectAllImgs">Select All</button>
        <span style="color:var(--border)">|</span>
        <button class="link-btn" id="deselectAllImgs">Deselect All</button>
      </div>
      <ul class="attach-list" id="imgList"></ul>
    </div>
  </div>

  <!-- Function selector -->
  <div class="section">
    <div class="section-title">Action for Power Automate</div>
    <select id="paFunction">
      <option value="">— Select an action —</option>
      <option value="save_sharepoint">📁  Save to SharePoint</option>
      <option value="notify_teams">💬  Send notification to Teams</option>
      <option value="create_task">✅  Create a Task in Planner</option>
      <option value="log_excel">📊  Log to Excel</option>
      <option value="forward_manager">Update MOOV Carrier Booking task and Send Mail to Producer</option>
      <option value="archive_email">🗄️  Archive Email</option>
    </select>
  </div>

  <!-- Comment box -->
  <div class="section">
    <div class="section-title">Comment / Note</div>
    <textarea id="commentBox" placeholder="Add a comment or note to send along with this email…"></textarea>
  </div>

  <!-- Send -->
  <button id="sendBtn" disabled>
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M1 1l14 7-14 7V9.5l10-1.5-10-1.5V1z" fill="currentColor"/>
    </svg>
    Send to Flow
  </button>

  <div id="statusBox">
    <span id="statusIcon"></span>
    <span id="statusMsg"></span>
  </div>

  <!-- Password Modal -->
  <div id="pwOverlay">
    <div id="pwModal">
      <h2>🔒 Enter Password</h2>
      <p>Enter the authorisation password to send this email to Power Automate.</p>
      <input type="password" id="pwInput" placeholder="Password" autocomplete="off"/>
      <div id="pwError"></div>
      <div class="pw-actions">
        <button id="pwSubmit">Confirm &amp; Send</button>
        <button id="pwCancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
